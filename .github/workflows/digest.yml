name: NSE F&O Morning Digest
on:
  schedule:
    - cron: '30 2 * * 1-5'   # 8:00 AM IST = 2:30 AM UTC, Mon-Fri
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push docs/ back to main
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate and send digest
        run: node src/index.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Publish digest to GitHub Pages
        run: |
          git config user.email "noreply@github.com"
          git config user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m "digest: update $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin HEAD:main
          
